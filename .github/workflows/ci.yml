name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go vet ./...
      - run: |
          output_file=$(mktemp)
          normalized_file=$(mktemp)
          unexpected_file=$(mktemp)
          stale_file=$(mktemp)
          GOWORK=off go run golang.org/x/tools/cmd/deadcode@v0.45.0 -test ./... > "$output_file"
          sed -E 's/^([^:]+):[0-9]+:[0-9]+: (.*)$/\1: \2/' "$output_file" > "$normalized_file"
          grep -Fvx -f .github/deadcode.allow "$normalized_file" > "$unexpected_file" || true
          grep -Fvx -f "$normalized_file" .github/deadcode.allow > "$stale_file" || true
          if [ -s "$unexpected_file" ]; then
            echo "Unexpected deadcode findings:"
            cat "$unexpected_file"
            exit 1
          fi
          if [ -s "$stale_file" ]; then
            echo "Stale deadcode allowlist entries:"
            cat "$stale_file"
            exit 1
          fi
      - run: go test ./...
